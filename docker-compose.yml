services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: infiltrado-postgres
    restart: unless-stopped
    ports:
      - "5443:5432"
    environment:
      POSTGRES_DB: infiltrado
      POSTGRES_USER: ${DB_USER:-infiltrado}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-infiltrado}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización: crea los schemas infiltrado y test_infiltrado.
      # Se ejecuta automáticamente solo en el primer arranque (volumen vacío).
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-infiltrado} -d infiltrado"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  # Perfil "app": solo se levanta con `docker-compose --profile app up`.
  # En desarrollo local, el backend corre con `mvn spring-boot:run`.
  backend:
    profiles: ["app"]
    build:
      context: ./backend
    container_name: infiltrado-backend
    restart: unless-stopped
    ports:
      - "8093:8093"
    environment:
      DB_HOST: postgres
      DB_NAME: infiltrado
      DB_USER: ${DB_USER:-infiltrado}
      DB_PASSWORD: ${DB_PASSWORD:-infiltrado}
      # En producción DEBE definirse JWT_SECRET en el entorno o en un .env real.
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-in-production-minimum-32-chars}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend React / Nginx ──────────────────────────────────────────────────
  # Perfil "app": solo se levanta con `docker-compose --profile app up`.
  # En desarrollo local, el frontend corre con `npm run dev`.
  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
    container_name: infiltrado-frontend
    restart: unless-stopped
    ports:
      - "5183:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: infiltrado_postgres_data
